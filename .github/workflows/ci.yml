name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_HOST: localhost
      DB_DATABASE: ci
      DB_USERNAME: ci
      DB_PASSWORD: ci
      SESSION_SECRET: ci-session-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release Gate (without build)
        run: npm run release:gate -- --skip-build

      - name: Build
        run: npm run build

      - name: Upload Ops Logs On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: task-tools-log
          path: .codex/logs/task-tools.log
          if-no-files-found: ignore
